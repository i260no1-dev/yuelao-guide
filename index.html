<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙北月老參拜與空間地圖導覽指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        templeRed: '#9F1239',
                        templeDark: '#4C0519',
                        goldAmber: '#D97706',
                        warmGold: '#F59E0B'
                    }
                }
            }
        }
    </script>
    <style>
      .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
      .custom-scrollbar::-webkit-scrollbar-track {
            background: #FFF1F2;
        }
      .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #F43F5E;
            border-radius: 3px;
        }
        /* 廟宇地圖活動殿堂呼吸燈與立體投影 */
      .active-glow {
            animation: pulse-glow 2s infinite;
            border-color: #D97706!important;
            background-color: #FEF3C7!important;
            color: #7F1D1D!important;
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3);
        }
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.7);
            }
            50% {
                box-shadow: 0 0 20px 8px rgba(217, 119, 6, 0.4);
            }
        }
    </style>
</head>
<body class="bg-[#FCF9F7] text-stone-900 font-sans leading-relaxed">

    <header class="relative overflow-hidden bg-gradient-to-b from-stone-900 via-rose-950 to-rose-900 text-white py-14 px-6 text-center shadow-lg border-b-4 border-amber-600">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <path d="M-100,100 C200,-50 300,300 800,50 C1200,-100 1300,400 1800,200" fill="none" stroke="#F59E0B" stroke-width="3"/>
                <path d="M-50,200 C300,50 400,400 900,100 C1300,300 1400,100 1900,300" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="10, 5"/>
            </svg>
        </div>
        <div class="relative z-10 max-w-4xl mx-auto space-y-3">
            <span class="inline-block bg-amber-600 text-white font-bold text-xs px-3 py-1 rounded-full uppercase tracking-widest shadow">雙北地區 · 空間導覽 4.0 實景旗艦版</span>
            <h1 class="text-3xl md:text-5xl font-black tracking-tight text-amber-100">繫上紅線 · 走入神殿</h1>
            <p class="text-rose-100 text-xs md:text-sm max-w-xl mx-auto font-light leading-relaxed">
                全台首創「實景相片 ╳ 儀式軌跡」聯動地圖。點擊下方切換步驟，左側地圖與神像資料即刻動態展示！
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-12">

        <section class="text-center space-y-4">
            <p class="text-xs text-rose-800 font-bold uppercase tracking-wider">── 請選擇您要參拜的雙北宮廟 ──</p>
            <div class="flex flex-wrap justify-center gap-2 max-w-4xl mx-auto">
                <button id="tab-xiahai" onclick="switchTemple('xiahai')" class="temple-tab px-4 py-2.5 rounded-2xl font-bold text-xs md:text-sm transition-all duration-300 shadow bg-rose-900 text-white border border-transparent">
                    ⛩️ 大稻埕霞海城隍廟
                </button>
                <button id="tab-longshan" onclick="switchTemple('longshan')" class="temple-tab px-4 py-2.5 rounded-2xl font-bold text-xs md:text-sm transition-all duration-300 shadow bg-white text-rose-950 hover:bg-rose-50 border border-stone-200">
                    ⛩️ 艋舺龍山寺
                </button>
                <button id="tab-cihui" onclick="switchTemple('cihui')" class="temple-tab px-4 py-2.5 rounded-2xl font-bold text-xs md:text-sm transition-all duration-300 shadow bg-white text-rose-950 hover:bg-rose-50 border border-stone-200">
                    ⛩️ 板橋慈惠宮
                </button>
                <button id="tab-hunglodei" onclick="switchTemple('hunglodei')" class="temple-tab px-4 py-2.5 rounded-2xl font-bold text-xs md:text-sm transition-all duration-300 shadow bg-white text-rose-950 hover:bg-rose-50 border border-stone-200">
                    ⛩️ 中和烘爐地福德宮
                </button>
                <button id="tab-yonglian" onclick="switchTemple('yonglian')" class="temple-tab px-4 py-2.5 rounded-2xl font-bold text-xs md:text-sm transition-all duration-300 shadow bg-white text-rose-950 hover:bg-rose-50 border border-stone-200">
                    ⛩️ 蘆洲湧蓮寺
                </button>
            </div>
        </section>

        <section id="temple-intro" class="bg-white rounded-3xl p-6 shadow-md border border-stone-100 flex flex-col md:flex-row gap-6 items-center">
            <div class="w-full md:w-1/3 h-48 rounded-2xl overflow-hidden relative shadow border bg-stone-100">
                <img id="temple-scene-img" src="" alt="廟宇實景" class="w-full h-full object-cover transition-all duration-500">
                <div class="absolute inset-0 bg-gradient-to-t from-stone-900/80 to-transparent flex items-end p-4">
                    <span id="temple-label" class="text-white font-bold text-xs md:text-sm"></span>
                </div>
            </div>
            <div class="flex-1 space-y-2 w-full">
                <h2 id="temple-title" class="text-xl md:text-2xl font-black text-rose-900"></h2>
                <p id="temple-address" class="text-xs text-stone-500"></p>
                <p id="temple-desc" class="text-xs md:text-sm text-stone-600 leading-relaxed"></p>
                <div id="temple-rule-tag" class="inline-block bg-rose-50 border border-rose-200 text-rose-950 px-3 py-1 rounded-xl text-xs font-semibold mt-2 animate-bounce"></div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-5 bg-white p-6 rounded-3xl shadow-lg border border-stone-100 space-y-6">
                <div class="flex items-center justify-between border-b border-stone-100 pb-3">
                    <h3 class="font-bold text-stone-800 text-xs md:text-sm flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                        廟宇空間參拜地圖
                    </h3>
                    <span class="text-[9px] bg-amber-600/10 text-amber-700 px-2 py-0.5 rounded font-mono font-bold">SPATIAL PLAN</span>
                </div>

                <div class="bg-amber-50/10 border-2 border-stone-200/80 rounded-2xl p-4 md:p-6 relative aspect-square max-w-sm mx-auto flex flex-col justify-between shadow-inner">
                    
                    <div class="flex justify-between items-center w-full gap-2">
                        <div id="map-room-left偏殿" class="flex-1 py-2.5 rounded-xl border text-center text-[10px] md:text-xs font-bold transition-all duration-300 bg-stone-100 text-stone-400 border-stone-200 shadow-sm">
                            左偏殿
                        </div>
                        <div id="map-room-後殿" class="flex-1 py-2.5 rounded-xl border text-center text-[10px] md:text-xs font-bold transition-all duration-300 bg-stone-100 text-stone-400 border-stone-200 shadow-sm">
                            後殿 / 月老廳 📍
                        </div>
                        <div id="map-room-right偏殿" class="flex-1 py-2.5 rounded-xl border text-center text-[10px] md:text-xs font-bold transition-all duration-300 bg-stone-100 text-stone-400 border-stone-200 shadow-sm">
                            右偏殿
                        </div>
                    </div>

                    <div class="w-full flex justify-center">
                        <div class="w-0.5 h-6 border-l-2 border-dashed border-stone-300"></div>
                    </div>

                    <div class="flex justify-center w-full">
                        <div id="map-room-正殿" class="w-full max-w-[220px] py-3.5 rounded-xl border text-center text-[10px] md:text-xs font-bold transition-all duration-300 bg-stone-100 text-stone-400 border-stone-200 shadow-sm">
                            正殿 (主祀神明) 📍
                        </div>
                    </div>

                    <div class="w-full flex justify-center">
                        <div class="w-0.5 h-6 border-l-2 border-dashed border-stone-300"></div>
                    </div>

                    <div class="flex justify-center w-full">
                        <div id="map-room-天公爐" class="w-full max-w-[180px] py-2.5 rounded-xl border text-center text-[10px] md:text-xs font-bold transition-all duration-300 bg-stone-100 text-stone-400 border-stone-200 shadow-sm">
                            廟埕 / 天公爐 📍
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center text-xs text-stone-500">
